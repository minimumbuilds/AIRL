# airl-driver test environment settings (issue-057, issue-058)
#
# AIRL_ALLOW_EXEC: SEC-6 — fixture tests need shell-exec permission. Set here so
#   the value is present before the test binary spawns any threads, eliminating
#   the set_var data race. force=false lets callers override for integration testing.
#
# RUST_TEST_THREADS workaround removed (issue-058): the runtime now uses
#   Arc<BytecodeFunc> in CallFrame instead of raw pointers, making concurrent
#   pipeline invocations safe. Parallel test execution is restored.
[env]
AIRL_ALLOW_EXEC    = { value = "*", force = false }
