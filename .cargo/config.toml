# airl-driver test environment settings (issue-057, issue-058, ci-fix-airl-017153)
#
# AIRL_ALLOW_EXEC: SEC-6 — fixture tests need shell-exec permission. Set here so
#   the value is present before the test binary spawns any threads, eliminating
#   the set_var data race. force=false lets callers override for integration testing.
#
# RUST_TEST_THREADS=1: issue-058 introduced Arc<BytecodeFunc> to fix CallFrame
#   data races, but the bytecode VM still holds unguarded *mut RtValue register
#   slots that are not safe across concurrent OS threads.  Running multiple test
#   binaries in parallel (the cargo default) produces intermittent SIGSEGVs in
#   CI (~10% failure rate locally, higher on GitHub runners).  The parallel_test
#   cases are marked #[ignore] until the VM is fully thread-safe; RUST_TEST_THREADS=1
#   is retained here as a defence-in-depth measure for the rest of the test suite.
#   force=false lets callers (e.g. a focused parallel run) override.
#
# Z3 paths (issue-085): hermetic build — point linker and compiler at the
#   system Z3 installation so `cargo build` succeeds without requiring the
#   caller to export LIBRARY_PATH / CPATH manually.  The `force = false`
#   policy lets CI or developer overrides take precedence.
[env]
AIRL_ALLOW_EXEC    = { value = "*", force = false }
RUST_TEST_THREADS  = { value = "1", force = false }
LIBRARY_PATH       = { value = "/usr/lib/x86_64-linux-gnu", force = false }
CPATH              = { value = "/usr/include", force = false }
