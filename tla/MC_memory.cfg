\* TLC config for AIRL memory model (retain/release/immortal)
\* 3 values, 2 children, rc up to 4 — keeps state space finite

CONSTANTS
    Values = {1, 2, 3}
    \* Children: value 1 holds refs to {2, 3}, value 2 holds ref to {3}, value 3 is a leaf
    Children = [v \in {1, 2, 3} |-> IF v = 1 THEN {2, 3} ELSE IF v = 2 THEN {3} ELSE {}]
    MAX_RC = 4

SPECIFICATION Spec

\* Safety — all three must pass
INVARIANT NoDoubleFree
INVARIANT NoUseAfterFree
INVARIANT ImmortalNeverFreed
INVARIANT RcConsistency

\* Liveness: EventuallyFreed
\* Deferred — requires temporal reasoning over the full reference graph.
\* Uncomment when ready to check liveness with fairness constraints.
\* PROPERTY EventuallyFreed
