\* TLC config for AIRL channel model
\* 3 threads, 1 channel — enough to find concurrent recv bugs

CONSTANTS
    Threads = {1, 2, 3}
    Channels = {1}
    MaxMessages = 1

SPECIFICATION Spec

\* Safety — these should all pass
INVARIANT MessageIntegrity
INVARIANT NoDoubleDelivery
INVARIANT FIFOPerSender

\* Fixed: concurrent recv on same handle now serializes via per-channel Mutex
INVARIANT NoConcurrentRecvConflict

\* Fixed: send after close returns distinct "channel closed" error (not "invalid handle")
INVARIANT NoSendAfterClose

\* Accepted design: closing rx drops queued messages (MPSC semantics).
\* Subsequent senders receive "channel closed", not "invalid handle".
\* NoMessagesLost is intentionally NOT enforced — message loss on rx-close is expected.
\* INVARIANT NoMessagesLost
