\* TLC config for AIRL channel model
\* 3 threads, 1 channel — enough to find concurrent recv bugs

CONSTANTS
    Threads = {1, 2, 3}
    Channels = {1}
    MaxMessages = 1

SPECIFICATION Spec

\* Safety — these should all pass
INVARIANT MessageIntegrity
INVARIANT NoDoubleDelivery
INVARIANT FIFOPerSender

\* CONFIRMED BUG: concurrent recv on same handle — second caller gets "invalid handle"
\* INVARIANT NoConcurrentRecvConflict

\* These should also fail — testing send-after-close and message loss on rx close
\* CONFIRMED: send after close returns misleading "invalid handle" error
\* INVARIANT NoSendAfterClose

\* CONFIRMED: closing receiver silently drops queued messages
\* INVARIANT NoMessagesLost
