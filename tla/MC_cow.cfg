\* TLC config for AIRL COW (Copy-on-Write) memory model
\* 2 values, 2 threads, rc up to 3 — exposes concurrent-access scenarios

CONSTANTS
    Values  = {1, 2}
    Threads = {1, 2}
    MAX_RC  = 3

SPECIFICATION Spec

\* Safety — checked by TLC

\* NoConcurrentMutation: two CowWrite operations cannot both take the fast
\* path for the same value in the same step. Holds because CowWrite is a
\* single atomic action. A split (non-atomic) CheckRc+Mutate model would
\* violate this — documenting that COW requires AIRL's single-threaded model.
INVARIANT NoConcurrentMutation

\* NoDoubleFree: freed values are never released again. Same as airl_memory.tla.
INVARIANT NoDoubleFree

\* CloneCorrectness: while a thread is mid slow-path CowWrite on value v,
\* data[v] equals the snapshot taken at write time. Verifies the original
\* value is unchanged when a clone is made (only the fast path mutates data).
INVARIANT CloneCorrectness

\* RcConsistency: rc stays in [0, MAX_RC].
INVARIANT RcConsistency

\* NoStaleRead: readers see consistent data after a CowWrite.
\* Deferred — requires modeling explicit Read operations (not yet in scope)
\* and fairness assumptions about thread scheduling. Analogous to RecvProgress
\* in MC_channels.cfg and EventuallyFreed in MC_memory.cfg.
\* PROPERTY NoStaleRead
