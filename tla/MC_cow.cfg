\* TLC config for AIRL COW (Copy-on-Write) memory model
\* 2 values, 2 threads, rc up to 3 — exposes concurrent-access scenarios

CONSTANTS
    Values  = {1, 2}
    Threads = {1, 2}
    MAX_RC  = 3

SPECIFICATION Spec

\* Safety — checked by TLC
\*
\* NoConcurrentMutation: verified because CowWrite is modeled as a single
\* atomic step. No two threads can simultaneously be in the fast path for
\* the same value. A split (non-atomic) CheckRc+Mutate model would violate
\* this invariant — documenting that COW requires the AIRL single-threaded
\* threading model or explicit synchronization.
INVARIANT NoConcurrentMutation

\* NoDoubleFree: freed values are never released again.
INVARIANT NoDoubleFree

\* NoStaleRead: when rc==1, at most one thread holds a reference.
\* This means the fast path never runs while another thread has a live ref.
INVARIANT NoStaleRead

\* RcConsistency: rc stays in [0, MAX_RC].
INVARIANT RcConsistency

\* NoStaleRead liveness: requires fairness assumptions and a richer read model.
\* Deferred — analogous to RecvProgress in MC_channels.cfg and EventuallyFreed
\* in MC_memory.cfg.
\* PROPERTY NoStaleReadLiveness
