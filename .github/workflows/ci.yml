name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p airl-rt
      - run: cargo clean -p airl-runtime
      - run: cargo build --features aot
      - run: cargo test -p airl-syntax -p airl-types -p airl-contracts -p airl-runtime -p airl-agent -p airl-driver
        env:
          AIRL_ALLOW_EXEC: "*"
      # No untrusted input consumed by this step; static invocation only.
      - name: Verify :verify policy baseline
        run: cargo run -p airl-driver -- verify-policy

  build-mynameisairl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout AirTraffic submodule
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/AirTraffic
          path: AirTraffic
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libz3-dev libcurl4-openssl-dev libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build host binary
        run: cargo build --release --features aot

      - name: Compile g3
        env:
          AIRL_STDLIB: ${{ github.workspace }}/stdlib
        run: |
          cargo run --release --features aot -- run \
            --load bootstrap/lexer.airl \
            --load bootstrap/parser.airl \
            --load bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl -- \
            bootstrap/lexer.airl \
            bootstrap/parser.airl \
            bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl \
            -o g3

      - name: Compile mynameisairl
        env:
          AIRL_DIR: ${{ github.workspace }}
          G3: ${{ github.workspace }}/g3
          AT_ROOT: ${{ github.workspace }}/AirTraffic
          AIRL_STDLIB: ${{ github.workspace }}/stdlib
        run: |
          bash servers/mynameisairl/build.sh servers/mynameisairl/mynameisairl
          chmod +x servers/mynameisairl/mynameisairl
          echo "mynameisairl built successfully: $(du -sh servers/mynameisairl/mynameisairl)"

  lint-shadows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check stdlib for defns shadowing Rust builtins
        run: make lint-shadows

  tlc-model-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download TLC
        run: |
          curl -sL -o tla/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: TLC model check — channel protocol invariants
        run: |
          java -jar tla/tla2tools.jar \
            -config tla/MC_channels.cfg \
            -workers auto \
            -deadlock \
            tla/airl_channels.tla
        timeout-minutes: 5

      - name: TLC model check — memory retain/release/immortal invariants
        run: |
          java -jar tla/tla2tools.jar \
            -config tla/MC_memory.cfg \
            -workers auto \
            -deadlock \
            tla/airl_memory.tla
        timeout-minutes: 5

      - name: TLC model check — COW fast-path invariants
        run: |
          java -jar tla/tla2tools.jar \
            -config tla/MC_cow.cfg \
            -workers auto \
            -deadlock \
            tla/airl_cow.tla
        timeout-minutes: 5
