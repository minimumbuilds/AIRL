name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-g3:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: g3-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: g3-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: g3-macos-arm64
          # Windows disabled — terminal.rs uses POSIX libc (termios/ioctl)
          # TODO: add #[cfg(unix)] guards or Windows equivalents
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   artifact: g3-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libz3-dev libcurl4-openssl-dev libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install z3
          echo "Z3_SYS_Z3_HEADER=$(brew --prefix z3)/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=$(brew --prefix z3)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix z3)/lib" >> "$GITHUB_ENV"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install z3 --version=4.13.4 -y
          $z3dir = (Get-ChildItem "C:\ProgramData\chocolatey\lib\z3\tools" -Directory | Select-Object -First 1).FullName
          echo "Z3_SYS_Z3_HEADER=$z3dir\include\z3.h" >> $env:GITHUB_ENV
          echo "CPATH=$z3dir\include" >> $env:GITHUB_ENV
          echo "LIBRARY_PATH=$z3dir\bin" >> $env:GITHUB_ENV

      - name: Build host binary
        run: cargo build --release --features aot

      - name: Compile g3 (Unix)
        if: runner.os != 'Windows'
        env:
          AIRL_STDLIB: ${{ github.workspace }}/stdlib
        run: |
          cargo run --release --features aot -- run \
            --load bootstrap/lexer.airl \
            --load bootstrap/parser.airl \
            --load bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl -- \
            bootstrap/lexer.airl \
            bootstrap/parser.airl \
            bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl \
            -o ${{ matrix.artifact }}

      - name: Compile g3 (Windows)
        if: runner.os == 'Windows'
        env:
          AIRL_STDLIB: ${{ github.workspace }}\stdlib
        run: |
          cargo run --release --features aot -- run `
            --load bootstrap/lexer.airl `
            --load bootstrap/parser.airl `
            --load bootstrap/bc_compiler.airl `
            bootstrap/g3_compiler.airl -- `
            bootstrap/lexer.airl `
            bootstrap/parser.airl `
            bootstrap/bc_compiler.airl `
            bootstrap/g3_compiler.airl `
            -o ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-mynameisairl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout AirTraffic
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/AirTraffic
          path: AirTraffic

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libz3-dev libcurl4-openssl-dev libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build host binary
        run: cargo build --release --features aot

      - name: Compile g3
        env:
          AIRL_STDLIB: ${{ github.workspace }}/stdlib
        run: |
          cargo run --release --features aot -- run \
            --load bootstrap/lexer.airl \
            --load bootstrap/parser.airl \
            --load bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl -- \
            bootstrap/lexer.airl \
            bootstrap/parser.airl \
            bootstrap/bc_compiler.airl \
            bootstrap/g3_compiler.airl \
            -o g3

      - name: Compile mynameisairl
        env:
          AIRL_DIR: ${{ github.workspace }}
          G3: ${{ github.workspace }}/g3
          AT_ROOT: ${{ github.workspace }}/AirTraffic
          AIRL_STDLIB: ${{ github.workspace }}/stdlib
        run: |
          bash servers/mynameisairl/build.sh servers/mynameisairl/mynameisairl
          chmod +x servers/mynameisairl/mynameisairl

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mynameisairl-linux-x86_64
          path: servers/mynameisairl/mynameisairl

  release:
    needs: [build-g3, build-mynameisairl]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            g3-linux-x86_64/g3-linux-x86_64
            g3-linux-arm64/g3-linux-arm64
            g3-macos-arm64/g3-macos-arm64
            mynameisairl-linux-x86_64/mynameisairl
            # g3-windows-x86_64.exe/g3-windows-x86_64.exe
